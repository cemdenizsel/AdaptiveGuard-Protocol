[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
mezo_testnet = "https://rpc.test.mezo.org"
anvil        = "http://127.0.0.1:8545"

[etherscan]
mezo_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${MEZO_EXPLORER_URL}" }
